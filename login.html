  <title>로그인 — MAINO : THE LINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #1d1d1f;
      --gray: #6e6e73;
      --light: #f5f5f7;
      --white: #ffffff;
      --blue: #0071e3;
      --red: #ff3b30;
    }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 300;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* 로고 */
    .logo {
      height: 24px;
      width: auto;
      margin-bottom: 48px;
    }

    /* 카드 */
    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      margin-bottom: 36px;
      gap: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 400;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: -0.01em;
    }
    .tab.active {
      color: var(--black);
      border-bottom-color: var(--black);
    }

    /* 폼 */
    .form { display: flex; flex-direction: column; gap: 12px; }
    .form.hidden { display: none; }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-label {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: -0.01em;
    }
    .input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 300;
      color: var(--black);
      background: var(--light);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input:focus {
      border-color: rgba(0,113,227,0.5);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
      background: var(--white);
    }
    .input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,59,48,0.1);
    }

    /* 버튼 */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.01em;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.99); }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-google {
      background: var(--white);
      color: var(--black);
      border: 1px solid rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0;
    }

    /* 구분선 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }
    .divider-line {
      flex: 1;
      height: 0.5px;
      background: rgba(0,0,0,0.1);
    }
    .divider-text {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 0.04em;
    }

    /* 에러 메시지 */
    .error-msg {
      font-size: 12px;
      color: var(--red);
      letter-spacing: -0.01em;
      min-height: 18px;
      margin-top: -4px;
    }

    /* 비밀번호 조건 */
    .pw-rules {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }
    .rule {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }
    .rule.pass {
      color: #34C759;
    }
    .rule.pass::first-letter {
      content: "✓";
    }

    /* 뒤로가기 */
    .back {
      margin-top: 40px;
      font-size: 12px;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }
    .back:hover { color: var(--black); }

    /* 로딩 스피너 */
    .btn.loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>

      </button>
    </div>

    <!-- 회원가입 폼 -->
    <div class="form hidden" id="form-signup">
      <div class="input-wrap">
        <label class="input-label">이메일</label>
        <input class="input" id="signup-email" type="email" autocomplete="email" placeholder="이메일 주소">
      </div>
      <div class="input-wrap">
        <label class="input-label">비밀번호</label>
        <input class="input" id="signup-pw" type="password" autocomplete="new-password" placeholder="비밀번호 (8자 이상)" oninput="checkPwStrength(this.value)">
        <div class="pw-rules" id="pw-rules">
          <span class="rule" id="rule-len">✕ 8자 이상</span>
          <span class="rule" id="rule-upper">✕ 대/소문자 포함</span>
          <span class="rule" id="rule-num">✕ 숫자 포함</span>
          <span class="rule" id="rule-special">✕ 특수 기호 포함</span>
        </div>
      </div>
      <div class="input-wrap">
        <label class="input-label">비밀번호 확인</label>
        <input class="input" id="signup-pw2" type="password" autocomplete="new-password" placeholder="비밀번호 재입력">
      </div>
      <p class="error-msg" id="signup-error"></p>
      <button class="btn btn-primary" onclick="handleSignup()">회원가입</button>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">또는</span>
        <div class="divider-line"></div>
      </div>
      <button class="btn btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        Google로 계속하기
      </button>
    </div>
  </div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCX5mXxSilNZVAGUv45hXOfxejN8W312cA",
    authDomain: "maino-the-line-shop.firebaseapp.com",
    projectId: "maino-the-line-shop",
    storageBucket: "maino-the-line-shop.firebasestorage.app",
    messagingSenderId: "993121019919",
    appId: "1:993121019919:web:1db226e2fa20d5f18d5b7a"
  });
  const auth = firebase.auth();

  // 리다이렉트 결과 먼저 처리 후 상태 확인
  let redirectHandled = false;
  auth.getRedirectResult().then(result => {
    redirectHandled = true;
    if (result && result.user) {
      window.location.href = 'index.html';
    }
  }).catch(e => {
    redirectHandled = true;
    console.error('redirect error:', e.code, e.message);
  });

  // 이미 로그인 중이면 index로
  auth.onAuthStateChanged(user => {
    if (user && redirectHandled) window.location.href = 'index.html';
    else if (user) setTimeout(() => { window.location.href = 'index.html'; }, 500);
  });

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';

    if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }

    try {
      await auth.signInWithEmailAndPassword(email, pw);
      window.location.href = 'index.html';
    } catch (e) {
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않아요.';
      else if (e.code === 'auth/invalid-email')
        errEl.textContent = '올바른 이메일 형식이 아니에요.';
      else
        errEl.textContent = '로그인 중 오류가 발생했어요.';
    }
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value.trim();
    const pw    = document.getElementById('signup-pw').value;
    const pw2   = document.getElementById('signup-pw2').value;
    const errEl = document.getElementById('signup-error');
    errEl.textContent = '';

    if (!email || !pw || !pw2) { errEl.textContent = '모든 항목을 입력해주세요.'; return; }
    if (pw !== pw2) { errEl.textContent = '비밀번호가 일치하지 않아요.'; return; }
    const pwValid = validatePw(pw);
    if (!pwValid.valid) { errEl.textContent = pwValid.msg; return; }

    try {
      await auth.createUserWithEmailAndPassword(email, pw);
      window.location.href = 'index.html';
    } catch (e) {
      if (e.code === 'auth/email-already-in-use')
        errEl.textContent = '이미 사용 중인 이메일이에요.';
      else if (e.code === 'auth/invalid-email')
        errEl.textContent = '올바른 이메일 형식이 아니에요.';
      else
        errEl.textContent = '회원가입 중 오류가 발생했어요.';
    }
  }

  function handleGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    auth.signInWithRedirect(provider);
  }

  function validatePw(pw) {
    if (pw.length < 8)          return { valid: false, msg: '비밀번호는 8자 이상이어야 해요.' };
    if (!/[a-z]/.test(pw))      return { valid: false, msg: '소문자를 포함해야 해요.' };
    if (!/[A-Z]/.test(pw))      return { valid: false, msg: '대문자를 포함해야 해요.' };
    if (!/[0-9]/.test(pw))      return { valid: false, msg: '숫자를 포함해야 해요.' };
    if (!/[^a-zA-Z0-9]/.test(pw)) return { valid: false, msg: '특수 기호를 포함해야 해요.' };
    return { valid: true };
  }

  function checkPwStrength(pw) {
    const lenEl     = document.getElementById('rule-len');
    const upperEl   = document.getElementById('rule-upper');
    const numEl     = document.getElementById('rule-num');
    const specialEl = document.getElementById('rule-special');
    if (!lenEl) return;

    const lenOk     = pw.length >= 8;
    const upperOk   = /[a-z]/.test(pw) && /[A-Z]/.test(pw);
    const numOk     = /[0-9]/.test(pw);
    const specialOk = /[^a-zA-Z0-9]/.test(pw);

    lenEl.textContent     = (lenOk     ? '✓' : '✕') + ' 8자 이상';
    upperEl.textContent   = (upperOk   ? '✓' : '✕') + ' 대/소문자 포함';
    numEl.textContent     = (numOk     ? '✓' : '✕') + ' 숫자 포함';
    specialEl.textContent = (specialOk ? '✓' : '✕') + ' 특수 기호 포함';

    lenEl.className     = 'rule' + (lenOk     ? ' pass' : '');
    upperEl.className   = 'rule' + (upperOk   ? ' pass' : '');
    numEl.className     = 'rule' + (numOk     ? ' pass' : '');
    specialEl.className = 'rule' + (specialOk ? ' pass' : '');
  }

  // 엔터키 지원
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginHidden = document.getElementById('form-login').classList.contains('hidden');
    if (!loginHidden) handleLogin();
    else handleSignup();
  });
</script>
</body>
