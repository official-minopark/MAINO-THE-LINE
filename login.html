<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — MAINO : THE LINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #1d1d1f;
      --gray: #6e6e73;
      --light: #f5f5f7;
      --white: #ffffff;
      --blue: #0071e3;
      --red: #ff3b30;
    }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 300;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* 로고 */
    .logo {
      height: 24px;
      width: auto;
      margin-bottom: 48px;
    }

    /* 카드 */
    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      margin-bottom: 36px;
      gap: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 400;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: -0.01em;
    }
    .tab.active {
      color: var(--black);
      border-bottom-color: var(--black);
    }

    /* 폼 */
    .form { display: flex; flex-direction: column; gap: 12px; }
    .form.hidden { display: none; }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-label {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: -0.01em;
    }
    .input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 300;
      color: var(--black);
      background: var(--light);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input:focus {
      border-color: rgba(0,113,227,0.5);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
      background: var(--white);
    }
    .input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,59,48,0.1);
    }

    /* 버튼 */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.01em;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.99); }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-google {
      background: var(--white);
      color: var(--black);
      border: 1px solid rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0;
    }

    /* 구분선 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }
    .divider-line {
      flex: 1;
      height: 0.5px;
      background: rgba(0,0,0,0.1);
    }
    .divider-text {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 0.04em;
    }

    /* 에러 메시지 */
    .error-msg {
      font-size: 12px;
      color: var(--red);
      letter-spacing: -0.01em;
      min-height: 18px;
      margin-top: -4px;
    }

    /* 비밀번호 조건 */
    .pw-rules {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }
    .rule {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }
    .rule.pass {
      color: #34C759;
    }
    .rule.pass::first-letter {
      content: "✓";
    }

    /* 뒤로가기 */
    .back {
      margin-top: 40px;
      font-size: 12px;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }
    .back:hover { color: var(--black); }

    /* 로딩 스피너 */
    .btn.loading { opacity: 0.6; pointer-events: none; }
    /* 비밀번호 찾기 링크 */
    .forgot-pw {
      font-size: 12px;
      color: var(--gray);
      text-align: right;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: color 0.2s;
      margin-top: -4px;
    }
    .forgot-pw:hover { color: var(--blue); }

    /* 개인정보 동의 */
    .agree-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 4px;
    }
    .agree-wrap input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: var(--black);
    }
    .agree-label {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: -0.01em;
      line-height: 1.6;
    }
    .agree-label a {
      color: var(--black);
      text-decoration: underline;
    }

    /* 비밀번호 찾기 화면 */
    .reset-form { display: none; flex-direction: column; gap: 12px; }
    .reset-form.active { display: flex; }
    .reset-title {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .reset-desc {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: -0.01em;
      line-height: 1.6;
      margin-bottom: 4px;
    }
    .success-msg {
      font-size: 12px;
      color: #34C759;
      letter-spacing: -0.01em;
      min-height: 18px;
    }


    /* ── 모바일 반응형 ── */
    @media (max-width: 480px) {
      body { padding: 32px 16px; }

      .card { max-width: 100%; }

      .input { padding: 12px 14px; font-size: 16px; /* iOS 줌 방지 */ }

      .btn { padding: 14px; font-size: 15px; }

      .logo { height: 20px; margin-bottom: 36px; }
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyCX5mXxSilNZVAGUv45hXOfxejN8W312cA",
    authDomain: "maino-the-line-shop.firebaseapp.com",
    projectId: "maino-the-line-shop",
    storageBucket: "maino-the-line-shop.firebasestorage.app",
    messagingSenderId: "993121019919",
    appId: "1:993121019919:web:1db226e2fa20d5f18d5b7a"
  });
  const auth = getAuth(app);

  // 이미 로그인 중이면 index로 (이메일 인증된 계정만)
  onAuthStateChanged(auth, user => {
    if (user && user.emailVerified) window.location.href = 'index.html';
  });

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    const loginForm = document.getElementById('form-login');
    const signupForm = document.getElementById('form-signup');
    // style.display 초기화 후 hidden 클래스로만 제어
    loginForm.style.display = '';
    signupForm.style.display = '';
    loginForm.classList.toggle('hidden', tab !== 'login');
    signupForm.classList.toggle('hidden', tab !== 'signup');
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
    try {
      const result = await signInWithEmailAndPassword(auth, email, pw);
      if (!result.user.emailVerified) {
        await auth.signOut();
        errEl.textContent = '이메일 인증이 필요해요. 받은편지함을 확인해주세요.';
        // 재발송 버튼 표시
        document.getElementById('resend-btn').style.display = 'inline-block';
        window._unverifiedUser = result.user;
        return;
      }
      window.location.href = 'index.html';
    } catch (e) {
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않아요.';
      else if (e.code === 'auth/invalid-email')
        errEl.textContent = '올바른 이메일 형식이 아니에요.';
      else
        errEl.textContent = '로그인 중 오류가 발생했어요.';
    }
  }

  function validatePw(pw) {
    if (pw.length < 8)             return { valid: false, msg: '비밀번호는 8자 이상이어야 해요.' };
    if (!/[a-z]/.test(pw))         return { valid: false, msg: '소문자를 포함해야 해요.' };
    if (!/[A-Z]/.test(pw))         return { valid: false, msg: '대문자를 포함해야 해요.' };
    if (!/[0-9]/.test(pw))         return { valid: false, msg: '숫자를 포함해야 해요.' };
    if (!/[^a-zA-Z0-9]/.test(pw))  return { valid: false, msg: '특수 기호를 포함해야 해요.' };
    return { valid: true };
  }

  function checkPwStrength(pw) {
    const lenEl     = document.getElementById('rule-len');
    const upperEl   = document.getElementById('rule-upper');
    const numEl     = document.getElementById('rule-num');
    const specialEl = document.getElementById('rule-special');
    if (!lenEl) return;
    const lenOk     = pw.length >= 8;
    const upperOk   = /[a-z]/.test(pw) && /[A-Z]/.test(pw);
    const numOk     = /[0-9]/.test(pw);
    const specialOk = /[^a-zA-Z0-9]/.test(pw);
    lenEl.textContent     = (lenOk     ? '✓' : '✕') + ' 8자 이상';
    upperEl.textContent   = (upperOk   ? '✓' : '✕') + ' 대/소문자 포함';
    numEl.textContent     = (numOk     ? '✓' : '✕') + ' 숫자 포함';
    specialEl.textContent = (specialOk ? '✓' : '✕') + ' 특수 기호 포함';
    lenEl.className     = 'rule' + (lenOk     ? ' pass' : '');
    upperEl.className   = 'rule' + (upperOk   ? ' pass' : '');
    numEl.className     = 'rule' + (numOk     ? ' pass' : '');
    specialEl.className = 'rule' + (specialOk ? ' pass' : '');
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value.trim();
    const pw    = document.getElementById('signup-pw').value;
    const pw2   = document.getElementById('signup-pw2').value;
    const errEl = document.getElementById('signup-error');
    errEl.textContent = '';
    const agreeEl = document.getElementById('agree-privacy');
    if (!agreeEl.checked) { errEl.textContent = '개인정보처리방침에 동의해주세요.'; return; }
    if (!email || !pw || !pw2) { errEl.textContent = '모든 항목을 입력해주세요.'; return; }
    if (pw !== pw2) { errEl.textContent = '비밀번호가 일치하지 않아요.'; return; }
    const pwValid = validatePw(pw);
    if (!pwValid.valid) { errEl.textContent = pwValid.msg; return; }
    try {
      const result = await createUserWithEmailAndPassword(auth, email, pw);
      await sendEmailVerification(result.user);
      await auth.signOut();
      // 회원가입 폼 숨기고 안내 메시지 표시
      document.getElementById('form-signup').style.display = 'none';
      // card 숨기고 인증 안내 동적 생성
      const card = document.querySelector('.card');
      card.style.display = 'none';
      const notice = document.createElement('div');
      notice.style.cssText = 'text-align:center;max-width:400px;width:100%;';
      notice.innerHTML = `
        <div style="font-size:48px;margin-bottom:20px;">📧</div>
        <h2 style="font-size:20px;font-weight:500;letter-spacing:-0.02em;color:#1d1d1f;margin-bottom:12px;">이메일을 확인해주세요</h2>
        <p style="font-size:14px;color:#6e6e73;line-height:1.7;margin-bottom:32px;">가입하신 이메일로 인증 링크를 보냈어요.<br>인증 후 로그인해주세요.</p>
        <button onclick="this.parentNode.remove();document.querySelector('.card').style.display='flex';window.switchTab('login');" style="background:#1d1d1f;color:#fff;border:none;padding:14px 32px;border-radius:980px;font-size:14px;cursor:pointer;font-family:inherit;">로그인하러 가기</button>
      `;
      card.parentNode.insertBefore(notice, card.nextSibling);
      return;
    } catch (e) {
      if (e.code === 'auth/email-already-in-use')
        errEl.textContent = '이미 사용 중인 이메일이에요.';
      else if (e.code === 'auth/invalid-email')
        errEl.textContent = '올바른 이메일 형식이 아니에요.';
      else
        errEl.textContent = '회원가입 중 오류가 발생했어요.';
    }
  }

  async function handleGoogle() {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
      await signInWithPopup(auth, provider);
      window.location.href = 'index.html';
    } catch (e) {
      const errEl = document.getElementById('login-error');
      if (errEl) errEl.textContent = '구글 로그인 오류: ' + e.code;
      console.error(e);
    }
  }

  async function resendVerification() {
    try {
      await signInWithEmailAndPassword(auth, 
        document.getElementById('login-email').value.trim(),
        document.getElementById('login-pw').value
      );
      await sendEmailVerification(auth.currentUser);
      await auth.signOut();
      document.getElementById('login-error').textContent = '인증 메일을 재발송했어요!';
      document.getElementById('resend-btn').style.display = 'none';
    } catch(e) {
      document.getElementById('login-error').textContent = '재발송 실패: ' + e.code;
    }
  }

  // 비밀번호 찾기
  function showReset() {
    document.getElementById('reset-form').classList.add('active');
    document.getElementById('tabs').style.display = 'none';
    document.getElementById('form-login').classList.add('hidden');
    document.getElementById('form-login').style.display = '';
    document.getElementById('reset-email').value = '';
    document.getElementById('reset-success').textContent = '';
    document.getElementById('reset-error').textContent = '';
  }

  function hideReset() {
    document.getElementById('reset-form').classList.remove('active');
    document.getElementById('tabs').style.display = 'flex';
    document.getElementById('form-login').classList.remove('hidden');
    document.getElementById('form-login').style.display = '';
  }

  async function handleReset() {
    const { sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const email = document.getElementById('reset-email').value.trim();
    const errEl = document.getElementById('reset-error');
    const sucEl = document.getElementById('reset-success');
    errEl.textContent = '';
    sucEl.textContent = '';
    if (!email) { errEl.textContent = '이메일을 입력해주세요.'; return; }
    try {
      await sendPasswordResetEmail(auth, email);
      sucEl.textContent = '재설정 링크를 보냈어요. 받은편지함을 확인해주세요.';
    } catch(e) {
      if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
        errEl.textContent = '등록되지 않은 이메일이에요.';
      else if (e.code === 'auth/invalid-email')
        errEl.textContent = '올바른 이메일 형식이 아니에요.';
      else
        errEl.textContent = '오류가 발생했어요. 다시 시도해주세요.';
    }
  }

  // 전역 함수 등록
  window.switchTab = switchTab;
  window.showReset = showReset;
  window.hideReset = hideReset;
  window.handleReset = handleReset;
  window.handleLogin = handleLogin;
  window.handleSignup = handleSignup;
  window.handleGoogle = handleGoogle;
  window.checkPwStrength = checkPwStrength;
  window.resendVerification = resendVerification;


  // 엔터키 지원
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginHidden = document.getElementById('form-login').classList.contains('hidden');
    if (!loginHidden) handleLogin();
    else handleSignup();
  });
</script>
</body>
</html>
