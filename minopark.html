<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미노park</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray-100: #f0f0ec;
      --gray-200: #e8e8e4;
      --gray-400: #a0a09a;
      --gray-600: #6a6a64;
      --nav-height: 64px;
    }
    html, body { width: 100%; scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--gray-200);
      z-index: 100;
    }
    .nav-back {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--gray-400);
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 300;
      white-space: nowrap;
    }
    .nav-back:hover { color: var(--black); }
    .nav-logo {
      height: 22px;
      width: auto;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    /* HERO */
    .hero {
      margin-top: var(--nav-height);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* 소개 + 영상 */
    .hero-content {
      padding: 72px 48px 80px;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 48px;
      align-items: center;
      min-height: calc(100vh - var(--nav-height));
    }

    /* 좌측: 소개 */
    .hero-intro {
      display: flex;
      flex-direction: column;
    }
    .hero-desc {
      font-size: 17px;
      font-weight: 300;
      color: var(--gray-600);
      line-height: 2.2;
      letter-spacing: 0.03em;
      margin-bottom: 48px;
    }
    .hero-links {
      display: flex;
      gap: 32px;
    }
    .hero-link {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--gray-400);
      text-decoration: none;
      text-transform: uppercase;
      padding-bottom: 6px;
      border-bottom: 0.5px solid var(--gray-200);
      transition: color 0.2s, border-color 0.2s;
    }
    .hero-link:hover { color: var(--black); border-color: var(--black); }

    /* 우측: 영상 */
    .hero-video {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }
    .video-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--gray-400);
      text-transform: uppercase;
    }
    .video-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--gray-100);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 0.5px solid var(--gray-200);
      position: relative;
      overflow: hidden;
    }
    .video-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.03) 0%, transparent 70%);
    }
    .video-play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .video-play-btn::after {
      content: '';
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 9px 0 9px 18px;
      border-color: transparent transparent transparent rgba(0,0,0,0.35);
      margin-left: 3px;
    }
    .video-coming {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--gray-400);
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* FOOTER */
    footer {
      border-top: 0.5px solid var(--gray-200);
      padding: 32px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .footer-brand { font-size: 11px; letter-spacing: 0.12em; color: var(--gray-400); }
    .footer-copy { font-size: 11px; color: var(--gray-400); }

    /* FADE IN */
    .fade-in {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── 모바일 반응형 ── */
    @media (max-width: 768px) {
      :root { --nav-height: 56px; }

      nav { padding: 0 20px; }

      .hero-content {
        padding: 56px 20px 60px;
        grid-template-columns: 1fr;
        gap: 40px;
        min-height: auto;
      }

      .hero-desc { font-size: 15px; margin-bottom: 32px; }

      .hero-links { gap: 20px; flex-wrap: wrap; }

      .video-placeholder { aspect-ratio: 16 / 9; }

      footer { padding: 28px 20px; flex-wrap: wrap; gap: 8px; }
    }
  </style>
