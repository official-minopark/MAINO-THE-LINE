  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --mint: #00D68F;
      --mint-light: #00F0A0;
      --black: #0D0D0D;
      --dark: #1A1A1A;
      --gray: #888888;
      --white: #ffffff;
      --nav-height: 80px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 300;
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      z-index: 100;
    }
    .nav-back {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }
    .nav-logo {
      height: 60px;
      width: auto;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-logo-mint {}

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 48px 80px;
      position: relative;
      overflow: hidden;
    }
    /* 배경 민트 글로우 */
    .hero::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,214,143,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-logo {
      width: 360px;
      height: auto;
      margin-top: 40px;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.1s forwards;
    }
    .hero-tag {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--mint);
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }
    .hero-title {
      font-size: clamp(44px, 6vw, 80px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.35s forwards;
    }
    .hero-title .mint { color: var(--mint); }
    .hero-sub {
      font-size: 17px;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      line-height: 1.9;
      max-width: 420px;
      margin-bottom: 56px;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }
    .hero-btns {
      display: flex;
      gap: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.65s forwards;
    }
    .btn-primary {
      background: var(--mint);
      color: var(--black);
      border: none;
      padding: 16px 36px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.2s;
      text-decoration: none;
    }
    .btn-primary:hover { background: var(--mint-light); transform: scale(1.03); }
    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: 0.5px solid rgba(255,255,255,0.2);
      padding: 16px 36px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 300;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.5); color: var(--white); }

    /* 서비스 섹션 */
    .services {
      padding: 120px 48px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-tag {
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--mint);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 72px;
      color: var(--white);
    }
    .service-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .service-card {
      background: var(--dark);
      border-radius: 28px;
      padding: 52px 48px;
      border: 0.5px solid rgba(255,255,255,0.06);
      transition: border-color 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,214,143,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .service-card:hover {
      border-color: rgba(0,214,143,0.25);
      transform: translateY(-4px);
    }
    .service-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(0,214,143,0.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      font-size: 24px;
    }
    .service-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      color: var(--white);
    }
    .service-name span { color: var(--mint); }
    .service-desc {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      line-height: 1.8;
      letter-spacing: 0.02em;
      margin-bottom: 36px;
    }
    .service-badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mint);
      background: rgba(0,214,143,0.1);
      border: 0.5px solid rgba(0,214,143,0.25);
      padding: 6px 16px;
      border-radius: 980px;
    }

    /* FOOTER */
    footer {
      border-top: 0.5px solid rgba(255,255,255,0.06);
      padding: 40px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #080808;
    }
    .footer-logo {
      height: 60px;
      opacity: 0.7;
    }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.2); }

    /* FADE IN */
    .fade-in {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<script>
  const io = new IntersectionObserver(es => {
    es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.15 });
  document.querySelectorAll('.fade-in').forEach(el => io.observe(el));

  document.querySelector('a[href="#services"]').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('services').scrollIntoView({ behavior: 'smooth' });
  });
</script>
